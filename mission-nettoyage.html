<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mission Nettoyage Express 🧹</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Fredoka One', cursive; background: #e0f2fe; text-align: center; margin: 0; padding: 2rem; overflow: hidden; }
  #game-area { position: relative; width: 100%; max-width: 600px; height: 60vh; background: #dcfce7; border: 4px solid #22c55e; border-radius: 20px; margin: 2rem auto; overflow: hidden; }
  .entity { position: absolute; font-size: 3rem; cursor: pointer; user-select: none; transition: transform 0.1s; }
  .entity:active { transform: scale(0.8); }
  .hud { display: flex; justify-content: space-around; font-size: 1.5rem; color: #1e293b; max-width: 600px; margin: 0 auto; background: white; padding: 1rem; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
  button { font-family: 'Fredoka One'; background: #3b82f6; color: white; border: none; padding: 1rem 2rem; font-size: 1.2rem; border-radius: 50px; cursor: pointer; margin-top: 1rem; }
  #end-screen { display: none; position: absolute; inset: 0; background: rgba(255,255,255,0.9); z-index: 10; align-items: center; justify-content: center; flex-direction: column; font-size: 2rem; color: #16a34a; }
</style>
</head>
<body>

<h1>🧹 Mission Nettoyage Express</h1>
<div class="hud">
  <div>⏱️ <span id="timer">30</span>s</div>
  <div>⭐ <span id="score">0</span> pts</div>
</div>

<div id="game-area">
  <div id="end-screen">
    <div>Fini ! 🎉</div>
    <div id="final-score">0 pts</div>
    <button onclick="startGame()">🔄 Rejouer</button>
    <button style="background:#f97316;" onclick="window.location.href='eco-detective.html'">🏠 Retour</button>
  </div>
</div>

<button id="start-btn" onclick="startGame()">🚀 C'est parti !</button>

<script>
  const badItems = ['🧴','🍾','🛍️','🧻']; // Déchets = Bien à cliquer
  const goodItems = ['🦋','🌻','🐝','🐦']; // Nature = Pas toucher !
  let score = 0, time = 30, timerInterval, spawnInterval;

  function startGame() {
    score = 0; time = 30;
    document.getElementById('score').innerText = score;
    document.getElementById('timer').innerText = time;
    document.getElementById('end-screen').style.display = 'none';
    document.getElementById('start-btn').style.display = 'none';
    document.querySelectorAll('.entity').forEach(e => e.remove());
    
    timerInterval = setInterval(() => {
      time--; document.getElementById('timer').innerText = time;
      if(time <= 0) endGame();
    }, 1000);
    
    spawnInterval = setInterval(spawnEntity, 800);
  }

  function spawnEntity() {
    const area = document.getElementById('game-area');
    const isBad = Math.random() > 0.3; // 70% de déchets
    const arr = isBad ? badItems : goodItems;
    const item = arr[Math.floor(Math.random() * arr.length)];
    
    const el = document.createElement('div');
    el.className = 'entity';
    el.innerText = item;
    el.style.left = Math.random() * 80 + '%';
    el.style.top = Math.random() * 80 + '%';
    
    el.onclick = () => {
      if(isBad) {
        score += 10;
        if(navigator.vibrate) navigator.vibrate(50);
      } else {
        score -= 5;
        if(navigator.vibrate) navigator.vibrate([100, 50, 100]); // Grosse erreur
      }
      document.getElementById('score').innerText = score;
      el.remove();
    };
    
    area.appendChild(el);
    setTimeout(() => { if(el.parentNode) el.remove(); }, 1500); // Disparaît vite !
  }

  function endGame() {
    clearInterval(timerInterval);
    clearInterval(spawnInterval);
    document.querySelectorAll('.entity').forEach(e => e.remove());
    document.getElementById('end-screen').style.display = 'flex';
    document.getElementById('final-score').innerText = score + ' pts';
  }
</script>
</body>
</html>
