<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Catch The Shape - Pro Version</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --text: #f8fafc;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
            touch-action: manipulation; /* Optimise le tactile */
        }

        /* --- Interface --- */
        #game-ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            background: rgba(15, 23, 42, 0.9);
            text-align: center;
        }

        .menu-card {
            background: #1e293b;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 80%;
            max-width: 400px;
        }

        button {
            display: block;
            width: 100%;
            padding: 1rem;
            margin: 0.5rem 0;
            border: none;
            border-radius: 0.5rem;
            background: var(--primary);
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
        }

        button:active { transform: scale(0.95); }

        .difficulty-btns { display: flex; gap: 5px; }
        .diff-btn { background: #475569; font-size: 0.9rem; }
        .diff-btn.active { background: #10b981; }

        /* --- Zone de Jeu --- */
        #game-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        .target {
            position: absolute;
            width: 60px;
            height: 60px;
            background: #f43f5e;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(244, 63, 94, 0.5);
            animation: spawn 0.3s ease-out;
        }

        @keyframes spawn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        #stats {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 1.2rem;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="stats">Score: 0 | Vies: 3</div>

    <div id="game-ui">
        <div class="menu-card" id="menu">
            <h1>CATCH PRO</h1>
            <p>Choisissez votre difficulté :</p>
            <div class="difficulty-btns">
                <button class="diff-btn" onclick="setDiff('easy', this)">Facile</button>
                <button class="diff-btn active" onclick="setDiff('medium', this)">Moyen</button>
                <button class="diff-btn" onclick="setDiff('hard', this)">Expert</button>
            </div>
            <button onclick="startGame()" style="margin-top: 20px; background: #10b981;">LANCER LE JEU</button>
        </div>
    </div>

    <div id="game-container"></div>

    <script>
        const container = document.getElementById('game-container');
        const ui = document.getElementById('game-ui');
        const statsEl = document.getElementById('stats');
        
        let score = 0;
        let lives = 3;
        let gameActive = false;
        let config = { speed: 1500, duration: 1200 }; // Défaut : Moyen

        function setDiff(level, btn) {
            document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            if(level === 'easy') config = { speed: 2000, duration: 1800 };
            if(level === 'medium') config = { speed: 1200, duration: 1000 };
            if(level === 'hard') config = { speed: 800, duration: 600 };
        }

        function startGame() {
            score = 0;
            lives = 3;
            gameActive = true;
            ui.style.display = 'none';
            updateStats();
            spawnLoop();
        }

        function updateStats() {
            statsEl.innerText = `Score: ${score} | Vies: ${lives}`;
        }

        function spawnLoop() {
            if(!gameActive) return;

            createTarget();
            setTimeout(spawnLoop, config.speed);
        }

        function createTarget() {
            const target = document.createElement('div');
            target.className = 'target';
            
            // Calcul des positions pour éviter les bords du mobile
            const size = 60;
            const x = Math.random() * (window.innerWidth - size);
            const y = Math.random() * (window.innerHeight - size - 50) + 40;

            target.style.left = `${x}px`;
            target.style.top = `${y}px`;

            // Gestion du clic/toucher
            target.addEventListener('pointerdown', (e) => {
                e.stopPropagation();
                score += 10;
                updateStats();
                target.remove();
            });

            container.appendChild(target);

            // Disparition si non cliqué
            setTimeout(() => {
                if(target.parentElement) {
                    target.remove();
                    loseLife();
                }
            }, config.duration);
        }

        function loseLife() {
            lives--;
            updateStats();
            if(lives <= 0) {
                gameOver();
            }
        }

        function gameOver() {
            gameActive = false;
            container.innerHTML = '';
            ui.style.display = 'flex';
            document.querySelector('#menu h1').innerText = "GAME OVER";
            document.querySelector('#menu p').innerText = `Score final : ${score}`;
        }
    </script>
</body>
</html>
